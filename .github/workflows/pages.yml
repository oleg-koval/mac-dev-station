name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'logo.svg'
      - 'logo.png'
      - 'social-card.svg'
      - 'social-card.png'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy assets to docs
        run: |
          cp logo.svg docs/logo.svg
          cp logo.png docs/logo.png
          cp social-card.svg docs/social-card.svg
          cp social-card.png docs/social-card.png

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - uses: actions/deploy-pages@v4
        id: deployment
